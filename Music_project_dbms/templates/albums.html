{% extends "base.html" %}

{% block content %}

<h2>💿 Albums</h2>

<table>
<tr><th>ID</th><th>Title</th><th>Artist</th><th>Action</th></tr>

{% for album in albums %}
<tr>
<td>{{ album.album_id }}</td>
<td>{{ album.title }}</td>
<td>{{ album.name }}</td>
<td>
<a href="/delete_album/{{ album.album_id }}" style="color:red;">Delete</a>
</td>
</tr>
{% endfor %}
</table>

<hr>

<h3>Add Album</h3>

<form method="POST" action="/add_album">
<input type="number" name="album_id" placeholder="Album ID">

<input type="text" name="title" placeholder="Album Title">

<select name="artist_id">
{% for artist in artists %}
<option value="{{ artist.artist_id }}">
{{ artist.artist_id }} - {{ artist.name }}
</option>
{% endfor %}
</select>

<button type="submit">Add</button>
</form>

{% endblock %}
